<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        h6{
            color: rgba(99, 103, 103, 0.638);
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="row mt-4 justify-content-center">
            <div6 class="col-lg-6 shadow p-3 border border-3">

                <h1 class="mb-4">Vacation Request Form</h1>
                <h6> Please fill out the form below
                    <br>
                    to request your vacation time.
                </h6>

                <form action="">



                    <div class="row mb-3 mt-4">
                        <div class="col-lg-6">
                            <label for="">First Name</label>
                            <input type="text" name="" class="form-control" placeholder="Enter your First Name">
                        </div>
                        <div class="col-lg-6">
                            <label for="">Last Name</label>
                            <input type="text" name="" class="form-control" placeholder="Enter your Last Name">
                        </div>
                    </div>


                    <div class="col-lg-12">
                        <label for="">Email address</label>
                        <input type="email" id="email" class="form-control" placeholder="Email" row="5">
                    </div>




                    <div class="row mb-3 mt-4">
                        <div class="col-lg-6">
                            <label for="">Phone number</label>
                            <input type="text" name="" class="form-control" placeholder="Enter your mobile number">
                        </div>
                        <div class="col-lg-6">
                            <label for="">Department</label>
                            <select class="form-control" name="" id="">
                                <option>select Department</option>
                                <option>computer</option>
                                <option> electronic</option>
                                <option> mech</option>
                                <option> ele</option>
                            </select>
                        </div>
                    </div>



                    <div class="row mb-3 mt-4">
                        <div class="col-lg-6">
                            <label for="">Vacation start date</label>
                            <input type="date" name="" class="form-control">
                        </div>
                        <div class="col-lg-6">
                            <label for="">Vacation last date</label>
                            <input type="date" name="" class="form-control">
                        </div>
                    </div>

                    <div>
                        <label for=""> Vacation type</label><br>
                        <input type="checkbox" name="" id="">Paid time off(PTO)<br>
                        <input type="checkbox" name="" id=""> Sick Leave<br>
                        <input type="checkbox" name="" id="">Unpaid Leave
                    </div><br>


                    <div class="mb-3">
                        <label for="message" class="form-label"><h5>Reason For Vacastion</h5></label>
                        <textarea class="form-control" id="message" row="5" placeholder="Please enter a brief"></textarea>
                    <h6>This will help us better understand your request.</h6>
                    </div>


                    <div>
                        
                        <input type="checkbox" name="" id=""> 
                </form>







        </div>
    </div>
    </div>
</body>

</html>
