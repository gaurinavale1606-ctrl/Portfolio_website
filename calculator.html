<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3{
            color: rgb(30, 1, 15);
            font-family:cursive;
            text-shadow:100px red ;
        }
        table{
            background:linear-gradient(red,yellow);
            padding: 15px;
            border-radius: 15px;
            border-color:white;
            margin: 50px;
            border: 2px solid black;
        }
        .clear{
            background-color: red;
            color: aliceblue;
        }
        #equal{
            background-color: rgb(232, 48, 78);
             color: aliceblue;
        }
        button{
            width:100%;
            height:100%;
            border-radius:3px;
            background: #e0e0e0;
        }
       .arith{
        background-color: rgb(246, 18, 18);
        color: aliceblue;
       }
    </style>
</head>
<body>
    <center>
        <h3>Calculator by using HTML,CSS and JS Programming</h3>
    <table cellpadding="3" cellspacing="3" >
        <div>
        <tr>
            <td colspan="4" id="1"><input type="text " id="display"></div></td>
            </div>
        </tr>
       
<tr>
    <td> <button onclick="append('7')">7</button> </td>
    <td> <button onclick="append('8')">8</button> </td>
    <td> <button onclick="append('9')">9</button> </td>
    <td> <button class="arith" onclick="append('/')">/</button> </td>
</tr>
<tr>
    <td> <button onclick="append('4')">4</button> </td>
    <td> <button onclick="append('5')">5</button> </td>
    <td> <button onclick="append('6')">6</button> </td>
    <td> <button  class="arith" onclick="append('*')">*</button> </td>
</tr>
<tr>
    <td> <button onclick="append('1')">1</button> </td>
    <td> <button onclick="append('2')">2</button> </td>
    <td> <button onclick="append('3')">3</button> </td>
    <td> <button  class="arith" onclick="append('-')">-</button> </td>
</tr>
<tr>
    <td> <button onclick="append('.')">.</button> </td>
    <td> <button onclick="append('0')">0</button> </td>
    <td> <button   onclick="clear_display()">C</button> </td>
    <td> <button  class="arith" onclick="append('+')">+</button> </td>
   
</tr>
<tr>
    <td colspan="4"><button class="equal" onclick="calculate()">=</button></td>
</tr> </center>
    
    </table>
    <script>
        function append(value)
        {
            document.getElementById("display").value+=value
        }
        function calculate()
        {
            var expression=document.getElementById("display").value;
            document.getElementById("display").value=eval(expression);
        }
        function clear_display()
        {
            document.getElementById("display").value="";
        }
    </script>
    
    
</body>
</html>
